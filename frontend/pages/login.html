<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Brew & Co.</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 6rem 1rem 3rem;
      background: radial-gradient(ellipse 60% 80% at 50% 30%, rgba(93,61,30,0.3), transparent), var(--espresso);
    }
    .auth-container { width: 100%; max-width: 460px; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo a { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 800; color: var(--gold); text-decoration: none; }
    .auth-logo a span { font-style: italic; color: var(--cream); }
    .auth-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-card { background: var(--espresso-mid); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; }
    .auth-tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .auth-tab { flex: 1; padding: 0.75rem; background: none; border: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .submit-btn { width: 100%; padding: 0.9rem; margin-top: 0.5rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--gold); text-decoration: none; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
    .error-msg { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 0.85rem; color: #e74c3c; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="/index.html" class="nav-logo">Brew<span>&</span>Co.</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/pages/menu.html">Menu</a></li>
      <li><a href="/pages/reservation.html">Reserve</a></li>
      <li><a href="/pages/about.html">About</a></li>
      <li><a href="/pages/contact.html">Contact</a></li>
    </ul>
    <div id="nav-auth"></div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></button>
  </nav>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="/index.html">Brew<span>&</span>Co.</a>
        <p>Your favourite coffee, your account.</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div class="auth-form active" id="loginForm">
          <div class="error-msg" id="loginError"></div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary submit-btn" onclick="doLogin()">Sign In ☕</button>
          <div class="divider"><span>or</span></div>
          <div class="auth-footer">Don't have an account? <a href="#" onclick="switchTab('register')">Create one →</a></div>
        </div>

        <!-- Register Form -->
        <div class="auth-form" id="registerForm">
          <div class="error-msg" id="registerError"></div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters" />
          </div>
          <button class="btn btn-primary submit-btn" onclick="doRegister()">Create Account</button>
          <div class="divider"><span>or</span></div>
          <div class="auth-footer">Already have an account? <a href="#" onclick="switchTab('login')">Sign in →</a></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = '/index.html';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
      document.getElementById('loginForm').classList.toggle('active', tab==='login');
      document.getElementById('registerForm').classList.toggle('active', tab==='register');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showError('loginError', 'Please fill in all fields'); return; }
      try {
        const { token, user } = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        setAuth(token, user);
        showToast(`Welcome back, ${user.name.split(' ')[0]}!`);
        setTimeout(() => window.location.href = '/index.html', 1000);
      } catch(e) { showError('loginError', e.message); }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      if (!name || !email || !password) { showError('registerError', 'Please fill in all fields'); return; }
      if (password.length < 6) { showError('registerError', 'Password must be at least 6 characters'); return; }
      try {
        const { token, user } = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password }) });
        setAuth(token, user);
        showToast(`Welcome to Brew & Co., ${user.name.split(' ')[0]}!`);
        setTimeout(() => window.location.href = '/index.html', 1000);
      } catch(e) { showError('registerError', e.message); }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').classList.contains('active')) doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
